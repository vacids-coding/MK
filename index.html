<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MK OBFUSCATOR • XTREME EDITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            background: #0a0c0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, #ff00ff20 0%, transparent 50%);
            animation: rotate 20s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            width: 100%;
            max-width: 1600px;
            background: rgba(10, 12, 15, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 25px;
            border: 2px solid #ff00ff40;
            box-shadow: 0 0 50px #ff00ff80, inset 0 0 20px #ff00ff40;
            position: relative;
            z-index: 1;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 50px #ff00ff80, inset 0 0 20px #ff00ff40; }
            50% { box-shadow: 0 0 80px #00ffff80, inset 0 0 30px #00ffff60; }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .glitch {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 #ff00ff, -0.05em -0.025em 0 #00ffff;
            animation: glitch 725ms infinite;
            letter-spacing: 5px;
        }

        .glitch span {
            position: absolute;
            top: 0;
            left: 0;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch-top 1s linear infinite;
            clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
            -webkit-clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
        }

        @keyframes glitch-top {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .subtitle {
            color: #ffffff80;
            font-size: 1.2rem;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 10px #ff00ff;
        }

        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
            font-size: 10px;
            color: #00ff00;
            overflow: hidden;
            z-index: -1;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .editor-panel {
            background: #050608;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #ff00ff40;
            box-shadow: 0 0 30px #ff00ff20;
            transition: all 0.3s ease;
        }

        .editor-panel:hover {
            border-color: #00ffff;
            box-shadow: 0 0 40px #00ffff40;
        }

        .panel-header {
            background: linear-gradient(90deg, #ff00ff20, #00ffff20);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ff00ff40;
        }

        .panel-header h3 {
            color: white;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px currentColor;
        }

        .panel-header.input h3 { color: #00ffff; }
        .panel-header.output h3 { color: #ff00ff; }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat-badge {
            background: #0a0c0f;
            padding: 5px 15px;
            border-radius: 30px;
            color: #00ffff;
            border: 1px solid #00ffff40;
            font-size: 0.9rem;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 450px;
            background: #0a0c0f;
            border: none;
            padding: 20px;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            caret-color: #ff00ff;
        }

        textarea::placeholder {
            color: #ffffff20;
        }

        .output textarea {
            color: #ff00ff;
        }

        .action-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .mk-button {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            color: black;
            border: 2px solid white;
            box-shadow: 0 0 20px #ff00ff;
        }

        .mk-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #ffffff80, transparent);
            transition: left 0.5s ease;
        }

        .mk-button:hover::before {
            left: 100%;
        }

        .mk-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #00ffff;
        }

        .mk-button.secondary {
            background: transparent;
            color: white;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
        }

        .mk-button.small {
            padding: 10px 25px;
            font-size: 1rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .feature-item {
            background: #050608;
            border: 1px solid #ff00ff40;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            box-shadow: 0 0 15px #ff00ff20;
            transition: all 0.3s ease;
        }

        .feature-item.active {
            border-color: #00ffff;
            box-shadow: 0 0 20px #00ffff;
            color: #00ffff;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #ffffff40;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0c0fe0;
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 30px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .cyber-spinner {
            width: 100px;
            height: 100px;
            border: 5px solid transparent;
            border-top-color: #ff00ff;
            border-right-color: #00ffff;
            border-bottom-color: #ff00ff;
            border-left-color: #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 50px #ff00ff;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px #ff00ff; }
            50% { opacity: 0.5; text-shadow: 0 0 40px #00ffff; }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #050608;
            border-left: 5px solid #00ffff;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            transform: translateX(500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            border: 1px solid #00ffff;
            box-shadow: 0 0 30px #00ffff;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            border-left-color: #ff00ff;
            border-color: #ff00ff;
            box-shadow: 0 0 30px #ff00ff;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
            animation: particleFloat 10s linear infinite;
        }

        @keyframes particleFloat {
            from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            to { transform: translateY(-100vh) rotate(360deg); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="matrix-bg" id="matrix"></div>
    
    <div class="loading-overlay" id="loading">
        <div class="cyber-spinner"></div>
        <div class="loading-text">OBFUSCATING</div>
    </div>

    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <div class="container">
        <div class="header">
            <div class="glitch" data-text="MK">MK</div>
            <div class="subtitle">OBFUSCATOR • XTREME</div>
        </div>

        <div class="main-content">
            <div class="editor-panel">
                <div class="panel-header input">
                    <h3>◈ INPUT ◈</h3>
                    <div class="stats">
                        <span class="stat-badge" id="inputLines">0 L</span>
                        <span class="stat-badge" id="inputChars">0 C</span>
                    </div>
                </div>
                <textarea id="inputScript" placeholder="> ENTER YOUR LU4 SCRIPT"></textarea>
            </div>

            <div class="editor-panel">
                <div class="panel-header output">
                    <h3>◈ OUTPUT ◈</h3>
                    <div class="stats">
                        <button class="mk-button small" onclick="copyOutput()" style="padding: 5px 15px; font-size: 0.9rem;">📋 COPY</button>
                        <button class="mk-button small" onclick="downloadOutput()" style="padding: 5px 15px; font-size: 0.9rem;">⬇️ SAVE</button>
                    </div>
                </div>
                <textarea id="outputScript" placeholder="> OBFUSC4TED SCRIPT" readonly></textarea>
            </div>
        </div>

        <div class="action-bar">
            <button class="mk-button" onclick="obfuscate()">⚡ EXECUTE OBFUSCATION ⚡</button>
            <button class="mk-button secondary" onclick="resetExample()">⟲ LOAD EXAMPLE</button>
            <button class="mk-button secondary" onclick="clearAll()">🗑️ CLEAR</button>
        </div>

        <div class="features-grid" id="features">
            <div class="feature-item active">INIFINITE LOOP</div>
            <div class="feature-item active">HEX STRINGS</div>
            <div class="feature-item active">VARIABLE RENAME</div>
            <div class="feature-item active">CONTROL FLOW</div>
            <div class="feature-item active">DYNAMIC CODE</div>
            <div class="feature-item active">STRING CONCAT</div>
            <div class="feature-item active">JUNK CODE</div>
            <div class="feature-item active">ANTI TAMPER</div>
        </div>

        <div class="footer">
            MK OBFUSCATOR • XTREME EDITION • ALL TECHNIQUES ACTIVE
        </div>
    </div>

    <script>
        // Matrix effect
        function createMatrix() {
            const matrix = document.getElementById('matrix');
            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            for (let i = 0; i < 100; i++) {
                const span = document.createElement('span');
                span.style.position = 'absolute';
                span.style.left = Math.random() * 100 + '%';
                span.style.top = Math.random() * 100 + '%';
                span.style.color = '#00ff00';
                span.style.opacity = Math.random() * 0.5;
                span.style.animation = `float ${Math.random() * 10 + 5}s linear infinite`;
                span.innerHTML = chars.charAt(Math.floor(Math.random() * chars.length));
                matrix.appendChild(span);
            }
        }
        createMatrix();

        // Elementi DOM
        const inputScript = document.getElementById('inputScript');
        const outputScript = document.getElementById('outputScript');
        const inputLines = document.getElementById('inputLines');
        const inputChars = document.getElementById('inputChars');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // Update stats
        function updateStats() {
            const text = inputScript.value;
            const lines = text.split('\n').length;
            const chars = text.length;
            inputLines.textContent = lines + 'L';
            inputChars.textContent = chars + 'C';
        }

        inputScript.addEventListener('input', updateStats);
        updateStats();

        // Show toast
        function showToast(message, isError = false) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            if (isError) toast.classList.add('error');
            else toast.classList.remove('error');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Copy output
        function copyOutput() {
            if (!outputScript.value) {
                showToast('NO OUTPUT GENERATED', true);
                return;
            }
            outputScript.select();
            document.execCommand('copy');
            showToast('✓ COPIED TO CLIPBOARD');
        }

        // Download output
        function downloadOutput() {
            if (!outputScript.value) {
                showToast('NO OUTPUT GENERATED', true);
                return;
            }
            const blob = new Blob([outputScript.value], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mk_obfuscated_' + Date.now() + '.lua';
            a.click();
            URL.revokeObjectURL(url);
            showToast('✓ FILE DOWNLOADED');
        }

        // Reset example
        function resetExample() {
            inputScript.value = `-- MK OBFUSCATOR EXAMPLE
local function calculate(a, b)
    return a * b + (a - b)
end

local data = {10, 20, 30, 40, 50}
local total = 0

for i = 1, #data do
    total = total + calculate(data[i], i)
end

print("RESULT: " .. total)

local function process(value)
    if value > 100 then
        return "HIGH"
    elseif value > 50 then
        return "MEDIUM"
    else
        return "LOW"
    end
end

print(process(total))`;
            updateStats();
            showToast('✓ EXAMPLE LOADED');
        }

        // Clear all
        function clearAll() {
            inputScript.value = '';
            outputScript.value = '';
            updateStats();
            showToast('✓ ALL CLEARED');
        }

        // Generate random string
        function randStr(length) {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Convert to hex
        function toHex(str) {
            let hex = '';
            for (let i = 0; i < str.length; i++) {
                hex += '\\x' + str.charCodeAt(i).toString(16).padStart(2, '0');
            }
            return hex;
        }

        // Generate obfuscated code
        function obfuscate() {
            const original = inputScript.value.trim();
            
            if (!original) {
                showToast('INSERT SCRIPT FIRST', true);
                return;
            }

            loading.classList.add('show');

            setTimeout(() => {
                try {
                    const obfuscated = generateObfuscated(original);
                    outputScript.value = obfuscated;
                    showToast('✓ OBFUSCATION COMPLETE');
                } catch (e) {
                    showToast('ERROR: ' + e.message, true);
                } finally {
                    loading.classList.remove('show');
                }
            }, 500);
        }

        // Main obfuscation function
        function generateObfuscated(code) {
            const vars = {};
            let varCounter = 0;
            const varPrefix = ['_0x', '_0x0', '_0x1', '_0x2', '_0x3', '_0x4', '_K', '_G', '_D', '_A', '_r', '_y'];
            
            // Generate random table
            function generateTable() {
                let table = 'local A={';
                for (let i = 0; i < 50; i++) {
                    let str = '';
                    for (let j = 0; j < Math.floor(Math.random() * 8) + 2; j++) {
                        str += String.fromCharCode(Math.floor(Math.random() * 26) + 97);
                    }
                    str = btoa(str).replace(/=/g, '');
                    table += '`' + str + '`';
                    if (i < 49) table += ',';
                }
                table += '}';
                return table;
            }

            // Generate infinite loop protection
            function generateInfiniteLoop() {
                let loop = '';
                const l1 = randStr(4);
                const l2 = randStr(4);
                const l3 = randStr(4);
                const l4 = randStr(4);
                
                loop += `local ${l1},${l2},${l3},${l4}=0,1,2,3\n`;
                loop += `while true do\n`;
                loop += `    ${l1}=${l1}+1\n`;
                loop += `    ${l2}=${l2}+${l3}\n`;
                loop += `    ${l3}=${l3}*${l4}\n`;
                loop += `    if ${l1}>1000 then\n`;
                loop += `        ${l1}=0\n`;
                loop += `        ${l2}=1\n`;
                loop += `        break\n`;
                loop += `    end\n`;
                loop += `end\n\n`;
                
                loop += `repeat\n`;
                loop += `    local function ${randStr(6)}()\n`;
                loop += `        local ${randStr(4)},${randStr(4)}=math.random(),math.random()\n`;
                loop += `        while true do\n`;
                loop += `            ${randStr(4)},${randStr(4)}=${randStr(4)},${randStr(4)}\n`;
                loop += `            if ${randStr(4)}>${randStr(4)} then break end\n`;
                loop += `        end\n`;
                loop += `        return ${randStr(4)}\n`;
                loop += `    end\n`;
                loop += `until false\n\n`;
                
                return loop;
            }

            // Generate dynamic loader
            function generateLoader() {
                const load = randStr(6);
                const pr = randStr(6);
                const err = randStr(6);
                
                return `local ${load}=loadstring or load\n` +
                       `local ${pr}=print\n` +
                       `local ${err}=error\n` +
                       `local ${randStr(4)}=pcall\n\n`;
            }

            // Obfuscate main code
            function obfuscateCode() {
                let lines = code.split('\n');
                let result = [];
                
                for (let line of lines) {
                    if (line.trim() === '') {
                        result.push('');
                        continue;
                    }
                    
                    // Rename variables
                    let processed = line.replace(/local\s+([a-zA-Z_][a-zA-Z0-9_]*)/g, (match, p1) => {
                        if (!vars[p1]) {
                            vars[p1] = varPrefix[varCounter % varPrefix.length] + Math.floor(Math.random() * 999);
                            varCounter++;
                        }
                        return 'local ' + vars[p1];
                    });
                    
                    // Replace variable usage
                    for (let [oldName, newName] of Object.entries(vars)) {
                        const regex = new RegExp('\\b' + oldName + '\\b', 'g');
                        processed = processed.replace(regex, newName);
                    }
                    
                    // Convert strings to hex
                    processed = processed.replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, (match, p1) => {
                        return '"' + toHex(p1) + '"';
                    });
                    
                    processed = processed.replace(/'([^'\\]*(\\.[^'\\]*)*)'/g, (match, p1) => {
                        return '"' + toHex(p1) + '"';
                    });
                    
                    // String concatenation
                    processed = processed.replace(/"\\x[0-9a-f]{2}\\x[0-9a-f]{2}[^"]*"/g, (match) => {
                        if (match.length > 20) {
                            let parts = [];
                            for (let i = 0; i < match.length; i += 8) {
                                parts.push(match.substr(i, 8) + '"');
                                if (i + 8 < match.length) parts.push('"');
                            }
                            return parts.join('..');
                        }
                        return match;
                    });
                    
                    result.push(processed);
                }
                
                return result.join('\n');
            }

            // Build final code
            const obfuscatedMain = obfuscateCode();
            const junk1 = randStr(8);
            const junk2 = randStr(8);
            const junk3 = randStr(8);
            
            let final = `--[[ MK OBFUSCATOR XTREME EDITION ]]\n\n`;
            final += generateTable() + '\n\n';
            final += `local function ${randStr(6)}(K)return(A)[K-${Math.floor(Math.random() * 1000)}]end\n\n`;
            final += generateLoader();
            final += generateInfiniteLoop();
            final += `-- MAIN PROTECTED CODE\n`;
            final += obfuscatedMain + '\n\n';
            
            // Add final infinite loop wrapper
            final += `-- FINAL PROTECTION LAYER\n`;
            final += `local ${junk1},${junk2}=1,2\n`;
            final += `while true do\n`;
            final += `    ${junk1},${junk2}=${junk2},${junk1}\n`;
            final += `    ${junk1}=${junk1}+${junk2}\n`;
            final += `    ${junk2}=${junk2}*${junk1}\n`;
            final += `    if ${junk1}>${junk2} then\n`;
            final += `        ${junk1}=${junk2}\n`;
            final += `        break\n`;
            final += `    end\n`;
            final += `end\n\n`;
            
            final += `return function(...)\n`;
            final += `    local ${randStr(4)}=${randStr(4)} or 0\n`;
            final += `    ${randStr(4)}=${randStr(4)}+1\n`;
            final += `    return ${randStr(4)}\n`;
            final += `end`;
            
            return final;
        }

        // Initialize
        resetExample();

        // Add particles
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.background = Math.random() > 0.5 ? '#ff00ff' : '#00ffff';
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
