<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK OBFUSCATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #0066ff;
            font-size: 2rem;
            font-weight: 600;
        }

        .header span {
            color: #666;
            font-size: 0.9rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .box {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
        }

        .box-header {
            background: #111111;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .box-header span {
            color: #0066ff;
            font-weight: 500;
        }

        .stats {
            color: #666;
            font-size: 0.85rem;
        }

        textarea {
            width: 100%;
            height: 450px;
            background: #0a0a0a;
            border: none;
            padding: 16px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }

        textarea::placeholder {
            color: #333;
        }

        textarea[readonly] {
            color: #0066ff;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 30px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            background: #111;
            color: #fff;
            border: 1px solid #1a1a1a;
        }

        .btn-primary {
            background: #0066ff;
            border: none;
        }

        .btn-primary:hover {
            background: #0052cc;
        }

        .btn:hover {
            background: #1a1a1a;
        }

        .btn-small {
            padding: 5px 12px;
            font-size: 0.8rem;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
        }

        .tag {
            background: #111;
            color: #666;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            border: 1px solid #1a1a1a;
        }

        .tag.active {
            color: #0066ff;
            border-color: #0066ff;
        }

        .footer {
            text-align: center;
            color: #333;
            font-size: 0.8rem;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #1a1a1a;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1a1a1a;
            border-top-color: #0066ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111;
            color: #fff;
            padding: 12px 24px;
            border-radius: 6px;
            transform: translateX(400px);
            transition: 0.3s;
            z-index: 10000;
            border-left: 3px solid #0066ff;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            border-left-color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <div class="container">
        <div class="header">
            <h1>MK</h1>
            <span>functional obfuscator</span>
        </div>

        <div class="main-content">
            <div class="box">
                <div class="box-header">
                    <span>INPUT</span>
                    <div class="stats">
                        <span id="inputLines">0L</span>
                        <span id="inputChars">0C</span>
                    </div>
                </div>
                <textarea id="inputScript" placeholder="paste lua code here..."></textarea>
            </div>

            <div class="box">
                <div class="box-header">
                    <span>OUTPUT</span>
                    <div class="stats">
                        <button class="btn btn-small" onclick="copyOutput()">copy</button>
                        <button class="btn btn-small" onclick="downloadOutput()">save</button>
                    </div>
                </div>
                <textarea id="outputScript" placeholder="obfuscated code..." readonly></textarea>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="obfuscate()">OBFUSCATE</button>
            <button class="btn" onclick="loadExample()">example</button>
            <button class="btn" onclick="clearAll()">clear</button>
        </div>

        <div class="tags">
            <span class="tag active">return wrapper</span>
            <span class="tag active">hex strings</span>
            <span class="tag active">rename vars</span>
            <span class="tag active">infinite loops</span>
            <span class="tag active">compact</span>
            <span class="tag active">executable</span>
        </div>

        <div class="footer">
            MK OBFUSCATOR • 100% functional
        </div>
    </div>

    <script>
        const input = document.getElementById('inputScript');
        const output = document.getElementById('outputScript');
        const linesSpan = document.getElementById('inputLines');
        const charsSpan = document.getElementById('inputChars');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMessage');

        function updateStats() {
            const t = input.value;
            linesSpan.textContent = t.split('\n').length + 'L';
            charsSpan.textContent = t.length + 'C';
        }
        input.addEventListener('input', updateStats);

        function showToast(msg, isError) {
            toastMsg.textContent = msg;
            toast.classList.add('show');
            if (isError) toast.classList.add('error');
            else toast.classList.remove('error');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function copyOutput() {
            if (!output.value) return showToast('no output', true);
            output.select();
            document.execCommand('copy');
            showToast('copied');
        }

        function downloadOutput() {
            if (!output.value) return showToast('no output', true);
            const blob = new Blob([output.value], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'mk_obfuscated.lua';
            a.click();
            showToast('downloaded');
        }

        function loadExample() {
            input.value = `-- test script
local function add(a, b)
    return a + b
end

local x = 10
local y = 20
local z = add(x, y)
print("result: " .. z)

local t = {1, 2, 3, 4, 5}
for i = 1, #t do
    print(t[i])
end

print("done")`;
            updateStats();
            showToast('example loaded');
        }

        function clearAll() {
            input.value = '';
            output.value = '';
            updateStats();
            showToast('cleared');
        }

        function randStr(l) {
            const c = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_';
            let r = '';
            for (let i = 0; i < l; i++) r += c[Math.floor(Math.random() * c.length)];
            return r;
        }

        function toHex(s) {
            let h = '';
            for (let i = 0; i < s.length; i++) {
                let c = s.charCodeAt(i).toString(16);
                if (c.length < 2) c = '0' + c;
                h += '\\x' + c;
            }
            return h;
        }

        function obfuscate() {
            const original = input.value.trim();
            if (!original) return showToast('no input', true);

            loading.classList.add('show');

            setTimeout(() => {
                try {
                    const obfuscated = generateObfuscated(original);
                    output.value = obfuscated;
                    showToast('obfuscated');
                } catch (e) {
                    showToast('error: ' + e.message, true);
                }
                loading.classList.remove('show');
            }, 100);
        }

        function generateObfuscated(code) {
            const varMap = {};
            let varCount = 0;
            const prefixes = ['_0x','_0x0','_0x1','_0x2','_0x3','_0x4'];

            // Process code line by line
            const lines = code.split('\n');
            const processedLines = [];

            for (let line of lines) {
                if (line.trim() === '') continue;

                // Find and replace local variables
                line = line.replace(/local\s+([a-zA-Z_][a-zA-Z0-9_]*)/g, (match, varName) => {
                    if (!varMap[varName]) {
                        varMap[varName] = prefixes[varCount % prefixes.length] + Math.floor(Math.random() * 999);
                        varCount++;
                    }
                    return 'local ' + varMap[varName];
                });

                // Replace variable usage
                for (let [oldName, newName] of Object.entries(varMap)) {
                    const regex = new RegExp('\\b' + oldName + '\\b', 'g');
                    line = line.replace(regex, newName);
                }

                // Convert strings to hex
                line = line.replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, (match, str) => {
                    return '"' + toHex(str) + '"';
                });
                line = line.replace(/'([^'\\]*(\\.[^'\\]*)*)'/g, (match, str) => {
                    return '"' + toHex(str) + '"';
                });

                processedLines.push(line);
            }

            // Generate random table
            const tableVars = [];
            for (let i = 0; i < 20; i++) {
                let s = '';
                for (let j = 0; j < 5; j++) {
                    s += String.fromCharCode(Math.floor(Math.random() * 26) + 97);
                }
                tableVars.push('`' + btoa(s).replace(/=/g, '') + '`');
            }
            const table = 'local A={' + tableVars.join(',') + '}';

            // Generate infinite loops (WITH BREAK - so they execute)
            const a1 = randStr(4);
            const a2 = randStr(4);
            const a3 = randStr(4);
            
            const loops = 
                'local ' + a1 + ',' + a2 + ',' + a3 + '=0,1,2' +
                'while true do' +
                    a1 + '=' + a1 + '+1' +
                    a2 + '=' + a2 + '+' + a3 +
                    'if ' + a1 + '>100 then break end' +
                'end' +
                'repeat' +
                    'local ' + randStr(4) + '=function()' +
                        'local ' + randStr(4) + '=1' +
                        'while ' + randStr(4) + '<10 do ' + randStr(4) + '=' + randStr(4) + '+1 end' +
                        'return ' + randStr(4) +
                    'end' +
                'until false';

            // Build final code - COMPACT and EXECUTABLE
            let final = 'return(function(...)';

            // Add components
            final += table;
            final += 'local function d(K)return(A)[K-' + Math.floor(Math.random() * 1000) + ']end';
            final += 'local l=loadstring or load';
            final += 'local p=print';
            final += loops;
            
            // Add main processed code (no spaces)
            final += processedLines.join('').replace(/\s+/g, '');
            
            // Close wrapper
            final += 'end)(...)';

            return final;
        }

        // Initialize
        loadExample();
        updateStats();
    </script>
</body>
</html>
